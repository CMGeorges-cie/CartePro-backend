services:
  - type: web
    name: cartepro-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app -b 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 60
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cartepro-db
          property: connectionString
      - key: RATELIMIT_STORAGE_URI
        fromService:
          type: redis
          name: cartepro-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: https://example.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

  - type: redis
    name: cartepro-redis
    plan: starter
    ipAllowList: []

databases:
  - name: cartepro-db
    databaseName: cartepro
    user: cartepro
