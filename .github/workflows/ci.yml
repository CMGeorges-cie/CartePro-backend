name: quality-security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  quality-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies and security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 bandit pip-audit

      - name: Lint
        run: flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Static security scan
        run: bandit -r app -x tests

      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: ci-secret-key
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_PUBLIC_KEY: pk_test_ci
        run: pytest -q
